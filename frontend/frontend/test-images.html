<!DOCTYPE html>
<html>
<head>
    <title>Test Vehicle Images</title>
</head>
<body>
    <h1>Testing Vehicle Images</h1>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
        <div>
            <h3>Mini Car</h3>
            <img src="/vehicles/mini-car.svg" alt="Mini Car" style="width: 100px; height: auto;">
        </div>
        <div>
            <h3>Car</h3>
            <img src="/vehicles/car.svg" alt="Car" style="width: 100px; height: auto;">
        </div>
        <div>
            <h3>Mini Van</h3>
            <img src="/vehicles/mini-van.svg" alt="Mini Van" style="width: 100px; height: auto;">
        </div>
        <div>
            <h3>Van</h3>
            <img src="/vehicles/van.svg" alt="Van" style="width: 100px; height: auto;">
        </div>
        <div>
            <h3>Jeep</h3>
            <img src="/vehicles/jeep.svg" alt="Jeep" style="width: 100px; height: auto;">
        </div>
        <div>
            <h3>Mini Bus</h3>
            <img src="/vehicles/mini-bus.svg" alt="Mini Bus" style="width: 100px; height: auto;">
        </div>
        <div>
            <h3>Bus</h3>
            <img src="/vehicles/bus.svg" alt="Bus" style="width: 100px; height: auto;">
        </div>
    </div>
</body>
</html>
